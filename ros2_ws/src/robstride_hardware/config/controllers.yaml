controller_manager:
  ros__parameters:
    update_rate: 200  # 200Hz RT loop

    # Real-time configuration for RT loop
    use_realtime: true
    thread_priority: 90        # SCHED_FIFO priority (higher than state_reader)
    cpu_affinity: 2            # Bind RT loop to CPU 2
    lock_memory: false         # No memory lock (swap disabled on embedded systems)

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    forward_position_controller:
      type: forward_command_controller/ForwardCommandController

# Joint state broadcaster configuration  
joint_state_broadcaster:
  ros__parameters:
    publish_rate: 50.0  # Keep at 50Hz for smooth visualization
    use_local_topics: false

forward_position_controller:
  ros__parameters:
    joints:
      - joint1
    interface_name: position
