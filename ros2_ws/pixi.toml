[workspace]
channels = ["robostack-jazzy", "conda-forge"]
name = "my_ros2_project"
platforms = ["linux-aarch64"]
version = "0.1.0"

[activation]
scripts = ["install/setup.sh"]

[activation.env]
DISPLAY = ":1"

[tasks]
build = { cmd = "colcon build --symlink-install", inputs = ["src"] }
rviz2 = "rviz2"

[dependencies]
ros-jazzy-desktop = ">=0.11.0,<0.12"
ros-jazzy-turtlesim = ">=1.8.3,<2"
colcon-common-extensions = ">=0.3.0,<0.4"
ros-jazzy-ament-cmake-auto = ">=2.5.4,<3"
compilers = ">=1.11.0,<2"
pkg-config = ">=0.29.2,<0.30"
cmake = ">=4.2.2,<5"
ninja = ">=1.13.2,<2"
ros-jazzy-ros2-control = ">=4.42.1,<5"
ros-jazzy-ros2-controllers = ">=4.36.0,<5"
ros-jazzy-controller-manager = ">=4.42.1,<5"
ros-jazzy-hardware-interface = ">=4.42.1,<5"
ros-jazzy-joint-state-broadcaster = ">=4.36.0,<5"
ros-jazzy-joint-trajectory-controller = ">=4.36.0,<5"
ros-jazzy-xacro = ">=2.1.1,<3"
ros-jazzy-robot-state-publisher = ">=3.3.3,<4"
ros-jazzy-forward-command-controller = ">=4.36.0,<5"
filelock = ">=3.20.3,<4"
